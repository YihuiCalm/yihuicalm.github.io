# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------

title: blank # left blank on purpose — your name shows in the navbar from the about page
first_name: Yihui
middle_name:
last_name: Wang
email: yihuiw@umd.edu
description: >
  Ph.D. student at the University of Maryland working on asynchronous neuromorphic processor design,
  spiking neural network hardware, and 3D integration.
keywords: neuromorphic, asynchronous VLSI, spiking neural networks, network-on-chip, 3D integration, computer architecture

lang: en
icon: ⚡  # favicon emoji (lightning bolt for hardware/circuits vibe)

url: https://yihuicalm.github.io
baseurl:  # leave empty for username.github.io sites
last_updated: true
back_to_top: true

# -----------------------------------------------------------------------------
# Theme
# -----------------------------------------------------------------------------

repo_theme_light: default
repo_theme_dark: dark
color_scheme:
  theme: preferred_color_scheme

# -----------------------------------------------------------------------------
# Layout
# -----------------------------------------------------------------------------

navbar_fixed: true
footer_fixed: false

# Dimensions
max_width: 950px

# TODO: add layout settings if needed

# -----------------------------------------------------------------------------
# Open Graph & Schema.org
# -----------------------------------------------------------------------------

serve_og_meta: false
serve_schema_org: false

# -----------------------------------------------------------------------------
# Social integration
# -----------------------------------------------------------------------------

github_username: YihuiCalm
linkedin_username: yihuiwang1997
scholar_userid:  # fill in once you have a Google Scholar profile
orcid_id:  # fill in once you have ORCID

# -----------------------------------------------------------------------------
# Analytics and search engine verification
# -----------------------------------------------------------------------------

google_analytics:  # fill in if desired
cronitor_analytics:
pirsch_analytics:
openpanel_analytics:

google_site_verification:
bing_site_verification:

# -----------------------------------------------------------------------------
# Blog
# -----------------------------------------------------------------------------

blog_name: blog
blog_nav_title: blog
blog_description:
permalink: /blog/:year/:title/

pagination:
  enabled: true

related_blog_posts:
  enabled: true
  max_related: 5

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------

collections:
  news:
    defaults:
      layout: post
    output: true
    permalink: /news/:path/
  projects:
    output: true
    permalink: /projects/:path/

announcements:
  enabled: true
  scrollable: true
  limit: 5
  # NOTE: add announcements in _news/ folder as markdown files

# -----------------------------------------------------------------------------
# Navbar settings
# -----------------------------------------------------------------------------

# NOTE: these correspond to pages in _pages/ folder
nav_order:
  - about
  - publications
  - projects
  - repositories
  - cv
  # - blog        # uncomment when you start blogging
  # - teaching    # uncomment if applicable

# -----------------------------------------------------------------------------
# About page (the landing page)
# -----------------------------------------------------------------------------

latest_posts:
  enabled: false  # set to true when you have blog posts
  scrollable: true
  limit: 3

# -----------------------------------------------------------------------------
# Publications
# -----------------------------------------------------------------------------

publications:
  enabled: true

scholar:
  last_name: [Wang]
  first_name: [Yihui, Y.]
  style: apa
  sort_by: year
  order: descending
  source: /_bibliography/
  bibliography: papers.bib
  bibliography_template: bib
  repository_url:
  badges:
    altmetric: true
    dimensions: true
    google_scholar: true
    inspirehep: false

# Filter for buttons alongside publications
filtered_bibtex_keywords:
  [abbr, abstract, additional_info, altmetric, annotation, arxiv,
   award, bibtex_show, blog, code, dimensions, google_scholar_id,
   html, inspirehep_id, pdf, poster, preview, selected, slides,
   supp, video, website]

# Maximum number of authors to display differently
max_author_limit: 3

# -----------------------------------------------------------------------------
# Projects page
# -----------------------------------------------------------------------------

enable_project_categories: true

# -----------------------------------------------------------------------------
# Repository page
# (auto-fetches your GitHub repos)
# -----------------------------------------------------------------------------

github_users:
  - username: YihuiCalm
    align: true

github_repos:
  - repo: YihuiCalm/Digital_Design_Flow
  - repo: YihuiCalm/IZ_Neuron_FPGA
  - repo: YihuiCalm/Blink-Twice-For-Help
  - repo: YihuiCalm/MIPS32_Pipeline_CPU_Chip_Design
  - repo: YihuiCalm/Neural_Spike_Detection_and_Sorting_Circuit

# -----------------------------------------------------------------------------
# CV settings (using RenderCV)
# -----------------------------------------------------------------------------

cv:
  enabled: true
  pdf_path: assets/pdf/cv.pdf  # upload your compiled CV PDF here

# -----------------------------------------------------------------------------
# Responsive images
# -----------------------------------------------------------------------------

imagemagick:
  enabled: true

# -----------------------------------------------------------------------------
# Features
# -----------------------------------------------------------------------------

enable_tooltips: false
enable_darkmode: true
enable_navbar_social: false
enable_medium_zoom: true
enable_progressbar: true
enable_video_embedding: false
enable_google_analytics: false

# -----------------------------------------------------------------------------
# Library versions (don't change unless you know what you're doing)
# -----------------------------------------------------------------------------

third_party_libraries:
  download: false
  source:

# -----------------------------------------------------------------------------
# Build settings
# -----------------------------------------------------------------------------

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  math_engine: mathjax
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

plugins:
  - jekyll-archives
  - jekyll-email-protect
  - jekyll-feed
  - jekyll-get-json
  - jekyll-imagemagick
  - jekyll-jupyter-notebook
  - jekyll-link-attributes
  - jekyll-minifier
  - jekyll-paginate-v2
  - jekyll-regex-replace
  - jekyll-scholar
  - jekyll-sitemap
  - jekyll-toc
  - jekyll-twitter-plugin
  - jemoji

# Sitemap settings
defaults:
  - scope:
      path: "assets"
    values:
      sitemap: false

sass:
  style: compressed

# -----------------------------------------------------------------------------
# Jekyll Archives (for blog)
# -----------------------------------------------------------------------------

jekyll-archives:
  enabled: [year, tags, categories]
  layouts:
    year: archive-year
    tag: archive-tag
    category: archive-category
  permalinks:
    year: "/blog/:year/"
    tag: "/blog/tag/:name/"
    category: "/blog/category/:name/"

# -----------------------------------------------------------------------------
# Exclude from processing
# -----------------------------------------------------------------------------

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - docker-compose.yml
  - docker-compose-slim.yml
  - Dockerfile
  - LICENSE
  - README.md
  - CONTRIBUTING.md
  - CUSTOMIZE.md
  - FAQ.md
  - INSTALL.md
  - package.json
  - package-lock.json
  - purgecss.config.js

keep_files:
  - CNAME
  - .nojekyll
